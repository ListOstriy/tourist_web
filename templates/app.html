<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ежедневник Туриста{% endblock title %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
</head>
<body>
    <div class="search"></div>
    <div class="menu">
        <div class="navigation">
            <a href="/" {% if active_menu == 'diary' %}class="active"{% endif %}>Ежедневник</a>
            <a href="calendar" {% if active_menu == 'calendar' %}class="active"{% endif %}>Календарь</a>
            <a href="#">Карта</a>
            <a href="#">Цели и достижения</a>
            <a href="#">Рекомендации</a>
        </div>
        <div class="profile">
            <a href="#">Никнейм</a>
            <div class="avatar"></div>
        </div>
    </div>
    <div class="content">
        <input type="search" name="search" placeholder="Поиск...">
        {% block content %}Контент{% endblock content %}
    </div>
</body>
</html>
